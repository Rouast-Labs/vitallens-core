name: Publish NPM and PyPI

on:
  push:
    tags:
      - 'v*'
  # Lets android-release be manually dry-run (build only — its publish step
  # is skipped on this trigger, see the `if:` condition below) without a
  # real version tag. The other three jobs are guarded to never run on this
  # trigger, since npm/PyPI publishes are just as irreversible as a real
  # tag push.
  workflow_dispatch:

jobs:
  npm-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Build and Publish
        run: |
          wasm-pack build --target web --no-default-features
          cd pkg
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  python-release:
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            args: --release --out dist --features python --sdist
          - os: macos-latest
            args: --release --out dist --features python --target universal2-apple-darwin
          - os: windows-latest
            args: --release --out dist --features python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install macOS Rust Targets
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: ${{ matrix.args }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  publish-pypi:
    if: github.event_name == 'push'
    needs: python-release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  android-release:
    runs-on: ubuntu-latest
    # Pauses for manual approval (required reviewer) before any step runs —
    # on both a real tag push and a manual dry run (workflow_dispatch), since
    # this gate doesn't distinguish between them. What keeps a dry run from
    # actually publishing is the `if:` on the "Publish to Maven Central" step
    # below, not this approval.
    environment: maven-central
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Install Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          # Matches the version verified locally (28.2.13676358 == r28c).
          ndk-version: r28c
          add-to-path: false
      - name: Build Android AAR
        run: make build-android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      - name: Publish to Maven Central
        # Skipped on a manual workflow_dispatch dry run — only a real tag
        # push actually reaches Maven Central. See the note on the job's
        # `environment:` above for what does and doesn't gate this.
        if: github.event_name == 'push'
        # --no-daemon: keeps this invocation isolated from the previous step's daemon.
        # signingInMemoryKeyId is required because GPG_PRIVATE_KEY was exported via
        # `gpg --export-secret-subkeys`, which Gradle's signing plugin can't
        # disambiguate without an explicit key ID (short form, 0x-prefixed).
        run: cd kotlin && ./gradlew :android:publishAndReleaseToMavenCentral --no-daemon
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}

  # Publishes the test/dev-only desktop JVM artifact (com.rouast:vitallens-core-jvm,
  # see kotlin/jvm/build.gradle.kts) — NOT part of the production Android SDK
  # surface, so it deliberately has its own coordinate and its own jobs here.
  #
  # The published jar bundles BOTH a macOS and a Linux native slice (the real
  # consumer, vitallens-android, runs its tests on Linux CI) — but neither OS
  # can cross-compile a native library for the other, so each slice is built
  # on its own runner and merged before packaging. Mirrors the
  # python-release -> publish-pypi matrix-build-then-merge pattern above.
  jvm-native-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - name: Build macOS native slices + Kotlin bindings
        run: make build-jvm-native-macos bindings-kotlin-jvm
      - uses: actions/upload-artifact@v4
        with:
          name: jvm-natives-darwin
          path: kotlin/jvm/nativeLibs
      - uses: actions/upload-artifact@v4
        with:
          name: jvm-bindings
          path: bindings/kotlin

  jvm-native-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Build Linux native slice
        run: make build-jvm-native-linux
      - uses: actions/upload-artifact@v4
        with:
          name: jvm-natives-linux
          path: kotlin/jvm/nativeLibs

  jvm-release:
    needs: [jvm-native-macos, jvm-native-linux]
    runs-on: ubuntu-latest
    # Same manual-approval gate as android-release — see its comment above
    # for why this doesn't by itself distinguish a real tag push from a dry
    # run (workflow_dispatch); that's handled by the `if:` below. No Rust
    # toolchain needed on this job — it only assembles and publishes what the
    # two native jobs already built.
    environment: maven-central
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Download native libraries and bindings
        uses: actions/download-artifact@v4
        with:
          pattern: jvm-natives-*
          merge-multiple: true
          path: kotlin/jvm/nativeLibs
      - uses: actions/download-artifact@v4
        with:
          name: jvm-bindings
          path: bindings/kotlin
      - name: Assemble JVM Jar
        # Always run (even on a dry run) — this is the only place the merged,
        # cross-platform jar actually gets built and validated end-to-end.
        run: cd kotlin && ./gradlew :jvm:jar
      - name: Publish to Maven Central
        # Skipped on a manual workflow_dispatch dry run — only a real tag
        # push actually reaches Maven Central. See android-release's `if:`
        # above for the same convention.
        if: github.event_name == 'push'
        run: cd kotlin && ./gradlew :jvm:publishAndReleaseToMavenCentral --no-daemon
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}